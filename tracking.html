<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tracking</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>#map{height:90vh}</style>
</head>
<body>
<h2>Tracking Colis</h2>
<div id="map"></div>

<script>
var map = L.map('map').setView([14.7167, -17.4677], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

fetch("http://localhost:3000/track/TRK123")
.then(res=>res.json())
.then(data=>{
  let coords = data.path || [[14.7,-17.4],[48.8,2.3],[40.7,-74.0]];
  L.polyline(coords).addTo(map);
});
</script>
</body>
</html>
